<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Agenda por Médico</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header><h1>Agenda por Médico</h1></header>
  <nav>
    <a href="/">Início</a>
    <a href="/pacientes.html">Pacientes</a>
    <a href="/especialidades.html">Especialidades</a>
    <a href="/medicos.html">Médicos</a>
    <a href="/agendamentos.html">Agendamentos</a>
    <a href="/agenda.html">Agenda</a>
    <a href="/relatorios.html">Relatórios</a>
  </nav>
  <main class="container">
    <h2>Consultar Agenda</h2>
    <div id="msg" class="message"></div>

    <form id="formFiltro">
      <div><label>Médico<select id="medico_id"></select></label></div>
      <div><label>Data<input id="data" type="date"></label></div>
      <div><label>&nbsp;<button type="submit">Filtrar</button></label></div>
      <div><label>&nbsp;<button type="button" class="btn-secondary" onclick="limparFiltro()">Limpar filtro</button></label></div>
    </form>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Data</th><th>Hora</th><th>Paciente</th><th>Médico</th><th>Especialidade</th><th>Status</th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>
    </div>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/agenda.js"></script>
</body>
</html>
