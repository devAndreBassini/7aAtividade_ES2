<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pacientes</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header><h1>Cadastro de Pacientes</h1></header>
  <nav>
    <a href="/">Início</a>
    <a href="/pacientes.html">Pacientes</a>
    <a href="/especialidades.html">Especialidades</a>
    <a href="/medicos.html">Médicos</a>
    <a href="/agendamentos.html">Agendamentos</a>
    <a href="/agenda.html">Agenda</a>
    <a href="/relatorios.html">Relatórios</a>
  </nav>
  <main class="container">
    <h2>Pacientes</h2>
    <div id="msg" class="message"></div>

    <form id="formPaciente">
      <input type="hidden" id="id">
      <div><label>Nome<input id="nome" required></label></div>
      <div><label>CPF<input id="cpf"></label></div>
      <div><label>Telefone<input id="telefone"></label></div>
      <div><label>E-mail<input id="email" type="email"></label></div>
      <div><label>Data de nascimento<input id="data_nascimento" type="date"></label></div>
      <div><label>&nbsp;<button type="submit">Salvar</button></label></div>
      <div><label>&nbsp;<button type="button" class="btn-secondary" onclick="limparFormulario()">Limpar</button></label></div>
    </form>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Nome</th><th>CPF</th><th>Telefone</th><th>E-mail</th><th>Nascimento</th><th>Ações</th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>
    </div>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/pacientes.js"></script>
</body>
</html>
