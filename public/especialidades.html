<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Especialidades</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header><h1>Cadastro de Especialidades</h1></header>
  <nav>
    <a href="/">Início</a>
    <a href="/pacientes.html">Pacientes</a>
    <a href="/especialidades.html">Especialidades</a>
    <a href="/medicos.html">Médicos</a>
    <a href="/agendamentos.html">Agendamentos</a>
    <a href="/agenda.html">Agenda</a>
    <a href="/relatorios.html">Relatórios</a>
  </nav>
  <main class="container">
    <h2>Especialidades Médicas</h2>
    <div id="msg" class="message"></div>

    <form id="formEspecialidade">
      <input type="hidden" id="id">
      <div><label>Nome<input id="nome" required></label></div>
      <div><label>Descrição<textarea id="descricao"></textarea></label></div>
      <div><label>&nbsp;<button type="submit">Salvar</button></label></div>
      <div><label>&nbsp;<button type="button" class="btn-secondary" onclick="limparFormulario()">Limpar</button></label></div>
    </form>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>Nome</th><th>Descrição</th><th>Ações</th></tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>
    </div>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/especialidades.js"></script>
</body>
</html>
